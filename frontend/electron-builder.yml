# electron-builder：僅 Windows（NSIS installer）。寺方所有 client 皆 Windows。
# 桌面 icon 來源 reference/icons/logo.png → build/icon.png（electron-builder 自動產 .ico）。
appId: tw.ceremony.bao-jue-temple
productName: 寶覺寺法會報名系統
copyright: © 寶覺寺

directories:
  buildResources: build
  output: release

# 打包進 asar 的應用檔（renderer + 編譯後的 electron main/preload）
files:
  - electron/dist/**/*
  - dist/frontend/browser/**/*
  - package.json

# Sidecar：.NET API（framework-dependent 單一 exe）放到 resources/api/
# 由 backend/publish.sh|ps1 先產出 backend/publish/win-x64/Ceremony.Api.exe。
# （可選）prereq installers 放 prereqs/ 供離線安裝；缺檔時 app 改開官方下載頁。
extraResources:
  - from: ../backend/publish/win-x64
    to: api
    filter: ['**/*', '!**/*.pdb']
  - from: build/prereqs
    to: prereqs
    filter: ['**/*']
    # build/prereqs 不存在時 electron-builder 會略過（無 bundled installer → 走 openExternal）
  # 出廠預寫 DB 連線種子：首次啟動無 config.json 時由 main.ts 讀此檔寫出 config（跳過 /setup）。
  # 內含 sa 密碼 → gitignore，不入 repo（範例見 build/default-config.example.json）；
  # 缺檔時 electron-builder 略過，app 退回 /setup 首次設定流程。
  - from: build/default-config.json
    to: default-config.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  # 自訂 include：preInit macro 把預設安裝資料夾固定為英文 Ceremony（保留中文 productName）。
  include: build/installer.nsh
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: 寶覺寺法會報名系統
