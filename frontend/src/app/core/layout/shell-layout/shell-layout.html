<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-title">寶覺寺</div>
      <div class="brand-subtitle">法會報名系統</div>
    </div>

    <nav class="nav">
      @for (item of navItems; track item.path) {
        <a
          class="nav-item"
          [routerLink]="item.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        >
          <app-icon class="nav-icon" [name]="item.icon" [size]="20" />
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      @if (auth.displayName(); as name) {
        <div class="user">{{ name }}</div>
      }
      <button type="button" class="logout" (click)="onLogout()">登出</button>
      <div class="version">{{ appVersion }}</div>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
